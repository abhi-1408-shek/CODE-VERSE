<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Animation</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #111;
        }

        .text-container {
            font-size: 3rem;
            color: #00ffcc;
            text-shadow: 
                0 0 15px rgba(0, 255, 204, 0.8),
                0 0 25px rgba(255, 0, 0, 0.7),
                0 0 35px rgba(0, 255, 0, 0.7),
                0 0 45px rgba(0, 0, 255, 0.7),
                0 0 55px rgba(255, 255, 0, 0.7);
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            text-align: center;
        }

        .letter {
            display: inline-block;
            transition: all 0.1s ease;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .buttons {
            display: flex;
            flex-direction: row;
            gap: 5%;
            margin-top: 5%;
            width: 80%;
            justify-content: center;
        }
        
        button {
            flex: 1;
            color: black;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 600;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            cursor: pointer;
        }
        
        .info-button {
            background-color: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.7);
        }
        
        .about-button {
            background-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.7);
        }
        
        button:hover {
            transform: scale(1.1);
        }
        
        .info-button:hover {
            box-shadow: 0 0 30px rgba(255, 0, 127, 1),
                        0 0 50px rgba(255, 0, 127, 0.8);
        }
        
        .about-button:hover {
            box-shadow: 0 0 30px rgba(0, 255, 204, 1),
                        0 0 50px rgba(0, 255, 204, 0.8);
        }
        
        .change_content:after {
            content: "";
            animation: changetext 7s infinite linear;
            color: orange;
        }
          
        @keyframes changetext {
            0% {
              content: "CLUB";
            }
            25% {
              content: "SOCIETY";
            }
            50% {
              content: "TEAM";
            }
            75% {
              content: "COMMUNITY";
            }
            100% {
                content:"GROUP";
            }
        }
        
        header{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            z-index: 10;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .text-container {
                font-size: 2rem;
            }

            .buttons {
                flex-direction: column;
                width: 90%;
                gap: 20px;
            }

            button {
                font-size: 1.5rem;
                padding: 12px 25px;
            }

            header {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .text-container {
                font-size: 1.5rem;
            }

            .buttons {
                width: 100%;
            }

            button {
                font-size: 1.2rem;
                padding: 10px 20px;
            }

            header {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h2>EXPLORE THIS AMAZING <kbd style="margin-top: -10px;"> | </kbd><kbd class="change_content"> </kbd> </h2>
    </header>
  <div class="container">
    <div class="text-container">
        <div class="text" id="animated-text">
        </div>
    </div>
    <div class="buttons">
        <button class="info-button" onclick="window.location.href='work/index.html'">Explore</button>
        <button class="about-button" onclick="window.location.href='work/contact.html'">Question?</button>
    </div>
  </div>

    <script>
        const originalText = "STARTUP CELL JAMMU";
        const symbolSet = ['@', '#', '$', '%', '^'];

        function getRandomSymbol() {
            return symbolSet[Math.floor(Math.random() * symbolSet.length)];
        }

        function animateLetter(letterElement, originalLetter) {
            let currentLetter = originalLetter;
            let animationCount = 0;

            const randomSymbols = [];
            for (let i = 0; i < 5; i++) {
                randomSymbols.push(getRandomSymbol());
            }

            const animationInterval = setInterval(() => {
                if (animationCount < 5) {
                    letterElement.textContent = randomSymbols[animationCount];
                    animationCount++;
                } else {
                    letterElement.textContent = currentLetter;
                    clearInterval(animationInterval);
                }
            }, 400);
        }

        function displayTextWithAnimation() {
            const container = document.getElementById('animated-text');
            container.innerHTML = '';

            Array.from(originalText).forEach((letter, index) => {
                const letterElement = document.createElement('span');
                letterElement.classList.add('letter');

                if (letter === ' ') {
                    letterElement.innerHTML = '&nbsp;';
                } else {
                    letterElement.textContent = letter;
                    setTimeout(() => animateLetter(letterElement, letter), 200 * index);
                }

                container.appendChild(letterElement);
            });
        }

        displayTextWithAnimation();

        setInterval(displayTextWithAnimation, 4000);
    </script>
</body>
</html>
